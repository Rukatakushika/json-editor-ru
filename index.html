<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Редактор | Визуальное конструирование с русским интерфейсо</title>
    <link href="https://cdn.jsdelivr.net/npm/jsoneditor@10.4.3/dist/jsoneditor.min.css" rel="stylesheet"
        type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/jsoneditor@10.4.3/dist/jsoneditor.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="toolbar">
        <button id="btn-new">Новый</button>
        <button id="btn-save">Сохранить</button>
        <div class="separator"></div>
        <button id="btn-expand">Развернуть всё</button>
        <button id="btn-collapse">Свернуть всё</button>
        <div class="separator"></div>
        <button id="btn-copy">Копировать</button>
        <button id="btn-clear" class="danger">Очистить</button>
        <div class="status" id="status">Готов</div>
    </div>

    <input type="file" id="file-input" accept=".json" style="display: none;">

    <div id="editor-container"></div>

    <script src="script.js"></script>
</body>

</html>
